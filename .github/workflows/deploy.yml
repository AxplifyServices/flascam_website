name: Deploy FLASCAM Website

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flascam-test-deployment
  cancel-in-progress: false

jobs:
  validate:
    name: Validate application

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/flascam_db
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api
        run: npm run build


  deploy:
    name: Deploy on VPS

    needs:
      - validate

    runs-on: ubuntu-latest

    environment:
      name: test
      url: https://flascam.axplitest.com

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            set -e

            APP_DIRECTORY="/opt/apps/flascam"
            REPOSITORY_DIRECTORY="/opt/apps/flascam/repo"

            cd "${REPOSITORY_DIRECTORY}"

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cp \
              "${REPOSITORY_DIRECTORY}/deploy/docker-compose.prod.yml" \
              "${APP_DIRECTORY}/docker-compose.prod.yml"

            cd "${APP_DIRECTORY}"

            docker compose \
              -f docker-compose.prod.yml \
              down

            docker compose \
              -f docker-compose.prod.yml \
              up \
              -d \
              --build \
              --force-recreate \
              --remove-orphans

            docker ps

            docker logs \
              flascam-backend \
              --tail 100