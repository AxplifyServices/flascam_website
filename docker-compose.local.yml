services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: flascam-minio
    restart: unless-stopped

    command:
      - server
      - /data
      - --console-address
      - ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./infrastructure/minio/data:/data

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9000/minio/health/live"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - flascam-local

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: flascam-minio-init

    depends_on:
      minio:
        condition: service_healthy

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET}
      MINIO_PRIVATE_BUCKET: ${MINIO_PRIVATE_BUCKET}

    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set flascam http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";

        mc mb --ignore-existing flascam/"$${MINIO_PUBLIC_BUCKET}";
        mc mb --ignore-existing flascam/"$${MINIO_PRIVATE_BUCKET}";

        mc anonymous set download flascam/"$${MINIO_PUBLIC_BUCKET}";
        mc anonymous set none flascam/"$${MINIO_PRIVATE_BUCKET}";

        echo "Buckets MinIO FLASCAM initialisés.";

    networks:
      - flascam-local

networks:
  flascam-local:
    name: flascam-local