services:
  flascam-backend:
    build:
      context: ./repo/backend
      dockerfile: Dockerfile

    container_name: flascam-backend

    restart: unless-stopped

    env_file:
      - /opt/apps/flascam/backend.env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      flascam-minio:
        condition: service_healthy

      flascam-minio-init:
        condition: service_completed_successfully

    networks:
      - flascam-internal
      - traefik-public

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://localhost:3000/api/health"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.flascam-backend.rule=Host(`flascam.axplitest.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.flascam-backend.entrypoints=websecure"
      - "traefik.http.routers.flascam-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flascam-backend.priority=100"

      - "traefik.http.services.flascam-backend.loadbalancer.server.port=3000"

      - "traefik.docker.network=web"


  flascam-frontend:
    build:
      context: ./repo/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api

    container_name: flascam-frontend

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: /api
      SERVER_API_URL: http://flascam-backend:3000/api

    depends_on:
      flascam-backend:
        condition: service_healthy

    networks:
      - flascam-internal
      - traefik-public

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.flascam-frontend.rule=Host(`flascam.axplitest.com`)"
      - "traefik.http.routers.flascam-frontend.entrypoints=websecure"
      - "traefik.http.routers.flascam-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flascam-frontend.priority=10"

      - "traefik.http.services.flascam-frontend.loadbalancer.server.port=3001"

      - "traefik.docker.network=web"

  flascam-minio:
    image: quay.io/minio/minio:latest

    container_name: flascam-minio

    restart: unless-stopped

    command:
      - server
      - /data
      - --console-address
      - ":9001"

    env_file:
      - /opt/apps/flascam/minio.env

    volumes:
      - flascam-minio-data:/data

    networks:
      - flascam-internal
      - traefik-public

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://localhost:9000/minio/health/live"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.flascam-storage.rule=Host(`flascam.axplitest.com`) && PathPrefix(`/storage`)"
      - "traefik.http.routers.flascam-storage.entrypoints=websecure"
      - "traefik.http.routers.flascam-storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flascam-storage.priority=110"

      - "traefik.http.routers.flascam-storage.middlewares=flascam-storage-strip"
      - "traefik.http.middlewares.flascam-storage-strip.stripprefix.prefixes=/storage"

      - "traefik.http.services.flascam-storage.loadbalancer.server.port=9000"

      - "traefik.docker.network=web"


  flascam-minio-init:
    image: quay.io/minio/mc:latest

    container_name: flascam-minio-init

    restart: "no"

    env_file:
      - /opt/apps/flascam/minio.env

    depends_on:
      flascam-minio:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e

        mc alias set flascam \
          http://flascam-minio:9000 \
          "$${MINIO_ROOT_USER}" \
          "$${MINIO_ROOT_PASSWORD}"

        mc mb \
          --ignore-existing \
          flascam/"$${MINIO_PUBLIC_BUCKET}"

        mc mb \
          --ignore-existing \
          flascam/"$${MINIO_PRIVATE_BUCKET}"

        mc anonymous set \
          download \
          flascam/"$${MINIO_PUBLIC_BUCKET}"

        mc anonymous set \
          none \
          flascam/"$${MINIO_PRIVATE_BUCKET}"

        echo "Initialisation MinIO terminée."

    networks:
      - flascam-internal


networks:
  flascam-internal:
    name: flascam-internal

  traefik-public:
    external: true
    name: web


volumes:
  flascam-minio-data:
    name: flascam-minio-data